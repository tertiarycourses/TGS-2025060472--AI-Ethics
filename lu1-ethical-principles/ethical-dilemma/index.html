<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Ethical Dilemma Simulator</title>
  <style>
    :root,[data-theme="dark"]{--bg:#1a1a2e;--card-bg:#16213e;--border:#3a3a5c;--text:#e0e0e0;--text-muted:#999;--accent:#6c63ff;--accent-light:#8b83ff;--green:#4ade80;--red:#ef4444;--orange:#f59e0b;--shadow:rgba(0,0,0,0.3);--heading-color:#8b83ff;--choice-bg:#1e2a45;--choice-hover:#2a3a5c;--correct-bg:#0f2e1a;--correct-border:#4ade80;--incorrect-bg:#2e0f0f;--incorrect-border:#ef4444;}
    [data-theme="light"]{--bg:#f5f0e8;--card-bg:#fffdf7;--border:#c4b99a;--text:#2c2c2c;--text-muted:#666;--accent:#4f46e5;--accent-light:#6366f1;--green:#16a34a;--red:#dc2626;--orange:#d97706;--shadow:rgba(0,0,0,0.08);--heading-color:#4f46e5;--choice-bg:#fff;--choice-hover:#f0ebe0;--correct-bg:#dcfce7;--correct-border:#16a34a;--incorrect-bg:#fee2e2;--incorrect-border:#dc2626;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Georgia','Times New Roman',serif;background:var(--bg);color:var(--text);min-height:100vh;}
    .container{max-width:900px;margin:0 auto;padding:2rem;}
    header{text-align:center;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:2px solid var(--border);}
    header h1{font-size:2rem;margin-bottom:0.5rem;}
    header p{color:var(--text-muted);max-width:600px;margin:0 auto;line-height:1.6;}
    .theme-toggle{position:fixed;top:1.2rem;right:1.5rem;z-index:100;background:var(--card-bg);border:1px solid var(--border);border-radius:50px;padding:0.5rem 0.9rem;cursor:pointer;font-size:1.2rem;display:flex;align-items:center;gap:0.4rem;}
    .theme-toggle:hover{border-color:var(--accent);}
    .theme-toggle .label{font-size:0.75rem;font-family:Georgia,serif;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;}
    .nav-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;}
    .nav-bar a{color:var(--accent);text-decoration:none;font-size:0.9rem;}
    .nav-bar a:hover{text-decoration:underline;}
    .progress{font-size:0.9rem;color:var(--text-muted);}
    .scenario-card{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:1.8rem;margin-bottom:1.5rem;}
    .scenario-domain{display:inline-block;padding:0.2rem 0.7rem;border-radius:12px;font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:#fff;margin-bottom:0.8rem;}
    .domain-healthcare{background:#06b6d4;}
    .domain-hiring{background:#8b5cf6;}
    .domain-journalism{background:#f59e0b;}
    .domain-education{background:#10b981;}
    .domain-surveillance{background:#ef4444;}
    .domain-creative{background:#ec4899;}
    .scenario-card h2{font-size:1.3rem;margin-bottom:1rem;line-height:1.4;}
    .scenario-card .description{color:var(--text-muted);line-height:1.7;margin-bottom:1.5rem;}
    .choices{display:flex;flex-direction:column;gap:0.8rem;}
    .choice-btn{background:var(--choice-bg);border:2px solid var(--border);border-radius:8px;padding:1rem 1.2rem;text-align:left;font-family:Georgia,serif;font-size:0.95rem;color:var(--text);cursor:pointer;transition:background 0.15s,border-color 0.15s;line-height:1.5;}
    .choice-btn:hover:not(.chosen){background:var(--choice-hover);border-color:var(--accent);}
    .choice-btn.best{background:var(--correct-bg);border-color:var(--correct-border);}
    .choice-btn.worst{background:var(--incorrect-bg);border-color:var(--incorrect-border);}
    .choice-btn.ok{background:var(--choice-bg);border-color:var(--orange);}
    .choice-btn .choice-label{display:block;font-size:0.75rem;font-weight:700;text-transform:uppercase;margin-top:0.5rem;letter-spacing:0.5px;}
    .choice-btn .choice-label.best-label{color:var(--green);}
    .choice-btn .choice-label.worst-label{color:var(--red);}
    .choice-btn .choice-label.ok-label{color:var(--orange);}
    .feedback{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:1.5rem;margin-bottom:1.5rem;display:none;}
    .feedback.visible{display:block;}
    .feedback h3{color:var(--heading-color);margin-bottom:0.8rem;}
    .feedback p{line-height:1.7;margin-bottom:0.8rem;}
    .feedback .stakeholders{margin:0.8rem 0;}
    .feedback .stakeholders strong{color:var(--accent);}
    .feedback .principles{margin:0.8rem 0;}
    .feedback .principles strong{color:var(--accent);}
    .next-btn{display:none;padding:0.8rem 2rem;background:var(--accent);color:#fff;border:none;border-radius:8px;font-family:Georgia,serif;font-size:1rem;font-weight:700;cursor:pointer;margin:0 auto;transition:background 0.15s;}
    .next-btn:hover{opacity:0.9;}
    .next-btn.visible{display:block;}
    .score-card{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:2rem;text-align:center;display:none;}
    .score-card.visible{display:block;}
    .score-card h2{font-size:1.6rem;margin-bottom:1rem;}
    .score-card .score-num{font-size:3rem;font-weight:700;color:var(--accent);margin-bottom:0.5rem;}
    .score-card p{color:var(--text-muted);line-height:1.6;margin-bottom:1rem;}
    .restart-btn{padding:0.8rem 2rem;background:var(--accent);color:#fff;border:none;border-radius:8px;font-family:Georgia,serif;font-size:1rem;font-weight:700;cursor:pointer;}
    .restart-btn:hover{opacity:0.9;}
    footer{text-align:center;padding:2rem 0 1rem;font-size:0.8rem;color:var(--text-muted);border-top:1px solid var(--border);margin-top:2rem;}
  </style>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()"><span id="themeIcon">&#x2600;&#xFE0F;</span><span class="label" id="themeLabel">Light</span></button>
  <div class="container">
    <header>
      <h1>AI Ethical Dilemma Simulator</h1>
      <p>Navigate real-world AI ethical scenarios. Choose wisely and learn about the consequences of each decision.</p>
    </header>
    <div class="nav-bar">
      <a href="../../hub/">&#x2190; Back to Course Hub</a>
      <span class="progress" id="progress">Scenario 1 of 6</span>
    </div>
    <div id="scenarioArea"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextScenario()">Next Scenario &#x2192;</button>
    <div class="score-card" id="scoreCard">
      <h2>Assessment Complete</h2>
      <div class="score-num" id="finalScore">0/6</div>
      <p id="scoreMsg"></p>
      <button class="restart-btn" onclick="restart()">Try Again</button>
    </div>
    <footer>LU1 Topic 1: Ethical Considerations &amp; Potential Risks &mdash; Responsible Generative AI Basics</footer>
  </div>
  <script>
    const SCENARIOS=[
      {domain:"healthcare",domainLabel:"Healthcare",title:"AI-Generated Discharge Summaries",description:"Your hospital has adopted an AI system to generate patient discharge summaries to save doctors' time. A nurse notices that one summary recommends a medication the patient is allergic to, but the system has been accurate 98% of the time. The hospital is under pressure to reduce costs.",choices:[
        {text:"Immediately pause the AI system until a thorough audit is completed. All existing summaries should be manually reviewed by qualified physicians.",rating:"best",label:"Best approach"},
        {text:"Flag this as an isolated incident and add a note to have doctors do a 'quick glance' review of AI summaries before discharge.",rating:"ok",label:"Partially addresses risk"},
        {text:"Continue using the system as-is since 98% accuracy is very high. The nurse should correct this one error and move on.",rating:"worst",label:"Dangerous approach"}
      ],feedback:{text:"This scenario illustrates the <strong>hallucination threat</strong> in healthcare AI. A 2% error rate in medical contexts can mean life-or-death consequences. Even highly accurate AI systems require robust human oversight in high-stakes domains.",stakeholders:"Patients, healthcare providers, hospital administration, families",principles:"Beneficence (do no harm), Accountability, Human Agency"}},
      {domain:"hiring",domainLabel:"Hiring & Recruitment",title:"AI Resume Screening Bias",description:"Your company uses an AI tool to screen job applications. An internal review reveals the tool consistently ranks resumes from candidates with traditionally female names lower than equivalent resumes with male names. The tool was trained on 10 years of historical hiring data. HR says the tool saves 200 hours per month.",choices:[
        {text:"Immediately stop using the tool. Conduct a full bias audit, retrain with balanced data, and implement ongoing fairness monitoring before redeploying.",rating:"best",label:"Best approach"},
        {text:"Keep using the tool but adjust scores manually by adding bonus points for underrepresented candidates to compensate.",rating:"ok",label:"Partially addresses risk"},
        {text:"The tool is reflecting historical patterns which probably correlate with actual performance. Continue using it since it saves significant time.",rating:"worst",label:"Perpetuates discrimination"}
      ],feedback:{text:"This scenario demonstrates <strong>confirmation bias in training data</strong>. Historical hiring data often reflects past discrimination, and training AI on biased data perpetuates and amplifies those biases. Manual adjustments are a band-aid that doesn't address the root cause.",stakeholders:"Job applicants, current employees, company reputation, HR team",principles:"Fairness, Transparency, Accountability"}},
      {domain:"journalism",domainLabel:"Journalism",title:"AI-Generated News Articles",description:"A news outlet uses AI to generate articles for breaking news stories to be first to publish. An AI-generated article about a local business fire includes quotes attributed to a fire chief who wasn't actually at the scene and statistics about building safety violations that appear fabricated. The article has already been shared 5,000 times on social media.",choices:[
        {text:"Immediately retract the article, publish a prominent correction, investigate all AI-generated articles for similar issues, and implement mandatory human verification before publication.",rating:"best",label:"Best approach"},
        {text:"Quietly edit the article to remove the fabricated quotes and statistics. Add a small correction note at the bottom of the article.",rating:"ok",label:"Insufficient response"},
        {text:"Leave the article as-is since taking it down would damage the outlet's credibility. Most readers won't check the quotes anyway.",rating:"worst",label:"Compounds the harm"}
      ],feedback:{text:"This is a clear case of <strong>AI hallucination in journalism</strong>. Fabricated quotes and statistics undermine public trust in media. The speed-over-accuracy pressure that leads to unverified AI publication reflects <strong>automation bias</strong> — trusting AI output without adequate verification.",stakeholders:"The public, the fire chief, the business owner, journalism profession, news outlet credibility",principles:"Transparency, Accountability, Beneficence"}},
      {domain:"education",domainLabel:"Education",title:"AI Plagiarism Detection False Positives",description:"A university deploys an AI tool to detect AI-generated student submissions. The tool flags a student's essay as 95% AI-generated. The student, who is a non-native English speaker, insists they wrote it themselves with the help of a grammar-checking tool. The professor is unsure but the deadline for grade submission is tomorrow.",choices:[
        {text:"Give the student a fair hearing, request drafts and writing process evidence, consult with academic integrity experts, and extend the grading deadline if needed.",rating:"best",label:"Best approach"},
        {text:"Ask the student to rewrite the essay in person under supervision as a compromise. If the quality is similar, accept the original.",rating:"ok",label:"Reasonable but potentially unfair"},
        {text:"Accept the AI tool's 95% confidence rating and fail the student for academic dishonesty. The tool is rarely wrong.",rating:"worst",label:"Unjust approach"}
      ],feedback:{text:"This scenario highlights <strong>overconfidence in AI tools</strong> and the risk of <strong>automation bias</strong>. AI plagiarism detectors have known biases against non-native English speakers and can produce false positives. Accepting an AI verdict without human judgement violates principles of fairness and due process.",stakeholders:"The student, other students, the professor, university reputation, non-native English speakers",principles:"Fairness, Human Agency, Accountability"}},
      {domain:"surveillance",domainLabel:"Surveillance & Privacy",title:"AI Facial Recognition in Public Spaces",description:"A city council proposes deploying AI facial recognition in public parks to reduce crime. The AI vendor claims 99.5% accuracy. However, independent studies show the accuracy drops to 85% for darker-skinned individuals. A citizens' group opposes the plan, citing privacy concerns. Crime rates have been rising and the next election is approaching.",choices:[
        {text:"Reject the current proposal. Commission an independent assessment of the technology's bias, consult with community groups, and explore less invasive alternatives for public safety.",rating:"best",label:"Best approach"},
        {text:"Approve a limited pilot programme in one park with monitoring for bias, and review results after 6 months before expanding.",rating:"ok",label:"Partially addresses concerns"},
        {text:"Deploy the system city-wide immediately. The 99.5% overall accuracy is excellent, and public safety must come first. The opposition is just fear of technology.",rating:"worst",label:"Ignores serious risks"}
      ],feedback:{text:"This scenario involves <strong>algorithmic bias and privacy rights</strong>. The significant accuracy disparity across skin tones means the system would disproportionately misidentify and harm minority communities. The 99.5% 'overall' accuracy masks serious inequity. Rushing deployment for political reasons reflects <strong>groupthink</strong> and dismissal of valid ethical concerns.",stakeholders:"All residents (especially minority communities), city council, law enforcement, civil liberties groups, AI vendor",principles:"Fairness, Privacy, Transparency, Human Agency"}},
      {domain:"creative",domainLabel:"Creative Industries",title:"AI Art for Commercial Campaign",description:"A marketing agency uses an AI image generator to create artwork for a major advertising campaign, replacing their usual freelance illustrators. The AI-generated images closely resemble the distinctive style of a well-known artist whose work was likely in the training data. The client loves the result and the agency saved 80% on creative costs. The artist discovers the campaign and threatens legal action.",choices:[
        {text:"Acknowledge the ethical issue, take down the campaign, compensate the artist, develop clear policies on AI-generated content and attribution, and maintain relationships with human creatives.",rating:"best",label:"Best approach"},
        {text:"Offer the artist a licensing fee retroactively and continue the campaign. Update future practices to check for style similarities.",rating:"ok",label:"Partial remedy"},
        {text:"Fight the legal claim since the AI created 'new' work. The artist can't own a style. Continue the campaign since the cost savings are significant.",rating:"worst",label:"Ethically and legally risky"}
      ],feedback:{text:"This scenario raises critical questions about <strong>intellectual property, creative labor, and fair compensation</strong> in the age of AI. While the legal landscape is evolving, the ethical obligation to respect creators' contributions and livelihoods is clear. Cost savings don't justify appropriating creative styles without attribution or compensation.",stakeholders:"The artist, freelance illustrators, the agency, the client, the creative industry",principles:"Fairness, Accountability, Beneficence"}}
    ];

    let current=0, score=0, answered=false;

    function render(){
      if(current>=SCENARIOS.length){showScore();return;}
      const s=SCENARIOS[current];
      answered=false;
      document.getElementById('progress').textContent=`Scenario ${current+1} of ${SCENARIOS.length}`;
      document.getElementById('feedback').classList.remove('visible');
      document.getElementById('feedback').innerHTML='';
      document.getElementById('nextBtn').classList.remove('visible');
      let html=`<div class="scenario-card"><span class="scenario-domain domain-${s.domain}">${s.domainLabel}</span><h2>${s.title}</h2><p class="description">${s.description}</p><div class="choices">`;
      s.choices.forEach((c,i)=>{html+=`<button class="choice-btn" data-idx="${i}" onclick="choose(${i})">${c.text}</button>`;});
      html+=`</div></div>`;
      document.getElementById('scenarioArea').innerHTML=html;
    }

    function choose(idx){
      if(answered)return;
      answered=true;
      const s=SCENARIOS[current];
      const btns=document.querySelectorAll('.choice-btn');
      btns.forEach((b,i)=>{
        b.classList.add('chosen');
        const c=s.choices[i];
        b.classList.add(c.rating);
        b.innerHTML+=`<span class="choice-label ${c.rating}-label">${c.label}</span>`;
      });
      if(s.choices[idx].rating==='best')score++;
      const fb=document.getElementById('feedback');
      fb.innerHTML=`<h3>Analysis</h3><p>${s.feedback.text}</p><p class="stakeholders"><strong>Affected Stakeholders:</strong> ${s.feedback.stakeholders}</p><p class="principles"><strong>Ethical Principles at Stake:</strong> ${s.feedback.principles}</p>`;
      fb.classList.add('visible');
      document.getElementById('nextBtn').classList.add('visible');
    }

    function nextScenario(){current++;render();}

    function showScore(){
      document.getElementById('scenarioArea').innerHTML='';
      document.getElementById('feedback').classList.remove('visible');
      document.getElementById('nextBtn').classList.remove('visible');
      const pct=Math.round(score/SCENARIOS.length*100);
      const sc=document.getElementById('scoreCard');
      document.getElementById('finalScore').textContent=`${score}/${SCENARIOS.length}`;
      let msg='';
      if(pct===100)msg='Excellent! You consistently identified the most ethical course of action across all scenarios.';
      else if(pct>=66)msg='Good awareness! Review the scenarios you missed to strengthen your ethical reasoning.';
      else msg='There\'s room for improvement. Consider revisiting the course material on ethical principles and risks.';
      document.getElementById('scoreMsg').textContent=msg;
      sc.classList.add('visible');
      document.getElementById('progress').textContent='Complete';
    }

    function restart(){
      current=0;score=0;
      document.getElementById('scoreCard').classList.remove('visible');
      render();
    }

    function toggleTheme(){const h=document.documentElement,c=h.getAttribute('data-theme'),n=c==='dark'?'light':'dark';h.setAttribute('data-theme',n);localStorage.setItem('theme',n);updateBtn(n);}
    function updateBtn(t){document.getElementById('themeIcon').innerHTML=t==='dark'?'&#x2600;&#xFE0F;':'&#x1F319;';document.getElementById('themeLabel').textContent=t==='dark'?'Light':'Dark';}
    (function(){const s=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',s);updateBtn(s);render();})();
  </script>
</body>
</html>
