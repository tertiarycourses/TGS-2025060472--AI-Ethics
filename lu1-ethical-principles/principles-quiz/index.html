<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Ethical Principles Quiz</title>
  <style>
    :root,[data-theme="dark"]{--bg:#1a1a2e;--card-bg:#16213e;--border:#3a3a5c;--text:#e0e0e0;--text-muted:#999;--accent:#6c63ff;--accent-light:#8b83ff;--green:#4ade80;--red:#ef4444;--shadow:rgba(0,0,0,0.3);--heading-color:#8b83ff;--chip-bg:#1e2a45;--chip-hover:#2a3a5c;--correct-bg:#0f2e1a;--correct-border:#4ade80;--incorrect-bg:#2e0f0f;--incorrect-border:#ef4444;}
    [data-theme="light"]{--bg:#f5f0e8;--card-bg:#fffdf7;--border:#c4b99a;--text:#2c2c2c;--text-muted:#666;--accent:#4f46e5;--accent-light:#6366f1;--green:#16a34a;--red:#dc2626;--shadow:rgba(0,0,0,0.08);--heading-color:#4f46e5;--chip-bg:#fff;--chip-hover:#f0ebe0;--correct-bg:#dcfce7;--correct-border:#16a34a;--incorrect-bg:#fee2e2;--incorrect-border:#dc2626;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Georgia','Times New Roman',serif;background:var(--bg);color:var(--text);min-height:100vh;}
    .container{max-width:900px;margin:0 auto;padding:2rem;}
    header{text-align:center;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:2px solid var(--border);}
    header h1{font-size:2rem;margin-bottom:0.5rem;}
    header p{color:var(--text-muted);max-width:600px;margin:0 auto;line-height:1.6;}
    .theme-toggle{position:fixed;top:1.2rem;right:1.5rem;z-index:100;background:var(--card-bg);border:1px solid var(--border);border-radius:50px;padding:0.5rem 0.9rem;cursor:pointer;font-size:1.2rem;display:flex;align-items:center;gap:0.4rem;}
    .theme-toggle:hover{border-color:var(--accent);}
    .theme-toggle .label{font-size:0.75rem;font-family:Georgia,serif;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;}
    .nav-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;}
    .nav-bar a{color:var(--accent);text-decoration:none;font-size:0.9rem;}
    .nav-bar a:hover{text-decoration:underline;}
    .score-bar{display:flex;gap:1.5rem;align-items:center;font-size:0.9rem;color:var(--text-muted);}
    .score-bar .correct{color:var(--green);}
    .score-bar .incorrect{color:var(--red);}

    .quiz-card{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:1.8rem;margin-bottom:1.5rem;}
    .quiz-card .q-num{font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--accent);margin-bottom:0.6rem;}
    .quiz-card h2{font-size:1.2rem;line-height:1.4;margin-bottom:0.8rem;}
    .quiz-card .q-context{color:var(--text-muted);font-size:0.9rem;line-height:1.6;margin-bottom:1.2rem;font-style:italic;}
    .options{display:flex;flex-direction:column;gap:0.6rem;}
    .opt-btn{background:var(--chip-bg);border:2px solid var(--border);border-radius:8px;padding:0.9rem 1.2rem;text-align:left;font-family:Georgia,serif;font-size:0.95rem;color:var(--text);cursor:pointer;transition:all 0.15s;line-height:1.4;}
    .opt-btn:hover:not(.selected):not(.locked){background:var(--chip-hover);border-color:var(--accent);}
    .opt-btn.correct-answer{background:var(--correct-bg);border-color:var(--correct-border);}
    .opt-btn.wrong-answer{background:var(--incorrect-bg);border-color:var(--incorrect-border);}
    .explanation{margin-top:1rem;padding:1rem;background:var(--bg);border-radius:8px;font-size:0.9rem;line-height:1.6;display:none;}
    .explanation.visible{display:block;}
    .explanation strong{color:var(--accent);}

    .results{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:2rem;text-align:center;display:none;margin-bottom:1.5rem;}
    .results.visible{display:block;}
    .results h2{font-size:1.6rem;margin-bottom:1rem;}
    .results .big-score{font-size:3rem;font-weight:700;color:var(--accent);margin-bottom:0.5rem;}
    .results p{color:var(--text-muted);line-height:1.6;margin-bottom:1rem;max-width:500px;margin-left:auto;margin-right:auto;}
    .restart-btn{padding:0.8rem 2rem;background:var(--accent);color:#fff;border:none;border-radius:8px;font-family:Georgia,serif;font-size:1rem;font-weight:700;cursor:pointer;}
    .restart-btn:hover{opacity:0.9;}
    footer{text-align:center;padding:2rem 0 1rem;font-size:0.8rem;color:var(--text-muted);border-top:1px solid var(--border);margin-top:2rem;}
  </style>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()"><span id="themeIcon">&#x2600;&#xFE0F;</span><span class="label" id="themeLabel">Light</span></button>
  <div class="container">
    <header>
      <h1>AI Ethical Principles Quiz</h1>
      <p>Test your knowledge of the core ethical principles in AI. Match principles to definitions, examples, and violation scenarios.</p>
    </header>
    <div class="nav-bar">
      <a href="../../hub/">&#x2190; Back to Course Hub</a>
      <div class="score-bar">
        <span class="correct" id="correctCount">Correct: 0</span>
        <span class="incorrect" id="incorrectCount">Incorrect: 0</span>
      </div>
    </div>
    <div id="quizArea"></div>
    <div class="results" id="results">
      <h2>Quiz Complete!</h2>
      <div class="big-score" id="bigScore">0/10</div>
      <p id="resultMsg"></p>
      <button class="restart-btn" onclick="restart()">Retake Quiz</button>
    </div>
    <footer>LU1 Topic 2: Ethical Principles in AI &mdash; Responsible Generative AI Basics</footer>
  </div>
  <script>
    const QUESTIONS=[
      {question:"Which AI ethical principle requires that AI systems treat all people equitably and not discriminate based on protected characteristics?",context:"Think about what ensures equal treatment across demographics.",options:["Transparency","Fairness","Accountability","Beneficence"],answer:1,explanation:"<strong>Fairness</strong> ensures AI systems do not discriminate based on race, gender, age, disability, or other protected characteristics. It applies to both training data and outputs, requiring active measures to detect and mitigate bias."},
      {question:"An AI healthcare system makes a misdiagnosis that harms a patient. No one can determine who is responsible for the error. Which principle has been violated?",context:"Consider the chain of responsibility in AI-driven decisions.",options:["Privacy","Human Agency","Accountability","Transparency"],answer:2,explanation:"<strong>Accountability</strong> requires clear lines of responsibility for AI systems and their outcomes. When harm occurs, there must be mechanisms to identify who is responsible and provide redress. Without accountability, there is no incentive to ensure AI safety."},
      {question:"A company deploys an AI chatbot but does not inform users they are speaking with AI, not a human. Which principle is violated?",context:"Think about users' right to know how decisions affecting them are made.",options:["Transparency","Fairness","Beneficence","Privacy"],answer:0,explanation:"<strong>Transparency</strong> requires that users know when they are interacting with AI and understand how AI decisions are made. Concealing the use of AI undermines trust and informed consent."},
      {question:"An AI system collects far more personal data than needed for its stated purpose and shares it with third parties without consent. Which principle is violated?",context:"Consider data collection minimisation and consent requirements.",options:["Accountability","Beneficence","Human Agency","Privacy"],answer:3,explanation:"<strong>Privacy</strong> requires that AI systems collect only necessary data, protect it appropriately, and use it only for stated purposes. Excessive data collection and unauthorised sharing are clear violations."},
      {question:"Which principle states that AI should be designed to benefit humanity and minimise harm?",context:"This principle focuses on the overall impact of AI on society.",options:["Transparency","Accountability","Beneficence","Human Agency"],answer:2,explanation:"<strong>Beneficence</strong> (also called 'do good / do no harm') requires that AI be designed and used to benefit humanity. The potential positive impact should outweigh the risks, and developers should actively work to minimise harm."},
      {question:"A bank uses AI to automatically reject loan applications without any human review, even for edge cases that the model is uncertain about. Which principle is most directly violated?",context:"Consider the role of human oversight in significant decisions.",options:["Privacy","Human Agency","Fairness","Transparency"],answer:1,explanation:"<strong>Human Agency</strong> requires that AI augments rather than replaces human decision-making, especially for significant decisions affecting people's lives. Humans should retain meaningful control and override capability."},
      {question:"An AI recruitment tool is found to consistently favour candidates from wealthy postcodes. This is an example of a failure in which principle?",context:"The tool uses location as a proxy for socioeconomic status.",options:["Fairness","Transparency","Privacy","Beneficence"],answer:0,explanation:"<strong>Fairness</strong> is violated when AI systems use proxy variables (like postcode) that correlate with protected characteristics (socioeconomic status, race). Even indirect discrimination constitutes a fairness failure."},
      {question:"A social media platform's AI content moderation system cannot explain why specific posts are removed. Users receive only 'community guidelines violation' with no detail. Which principle is lacking?",context:"Users deserve to understand decisions that affect their content.",options:["Accountability","Beneficence","Transparency","Human Agency"],answer:2,explanation:"<strong>Transparency</strong> requires that AI decisions be explainable. Users affected by AI decisions should be able to understand the reasoning. Opaque moderation decisions undermine trust and prevent users from adjusting their behaviour."},
      {question:"A government deploys predictive policing AI that disproportionately targets minority neighbourhoods, leading to over-policing. Multiple principles are violated, but which is the PRIMARY concern?",context:"Consider which principle addresses the core harm.",options:["Transparency","Fairness","Privacy","Human Agency"],answer:1,explanation:"While multiple principles are involved, <strong>Fairness</strong> is the primary concern. The system's disproportionate targeting of minority communities constitutes algorithmic discrimination, regardless of whether the system is transparent or accountable."},
      {question:"The EU AI Act, Singapore's AI Governance Framework, and OECD AI Principles all share which common emphasis?",context:"Think about what unifies major international AI governance frameworks.",options:["They all require AI systems to be open source","They all emphasise human-centric AI that respects fundamental rights","They all ban the use of AI in government","They all require AI systems to be 100% accurate"],answer:1,explanation:"Major international AI governance frameworks share a common emphasis on <strong>human-centric AI</strong> that respects fundamental rights and freedoms. While they differ in specifics, they all prioritise human wellbeing, fairness, transparency, and accountability."}
    ];

    let correct=0,incorrect=0,answeredSet=new Set();

    function renderQuiz(){
      let html='';
      QUESTIONS.forEach((q,i)=>{
        html+=`<div class="quiz-card" id="q${i}"><div class="q-num">Question ${i+1} of ${QUESTIONS.length}</div><h2>${q.question}</h2>`;
        if(q.context)html+=`<p class="q-context">${q.context}</p>`;
        html+=`<div class="options">`;
        q.options.forEach((o,j)=>{html+=`<button class="opt-btn" id="q${i}o${j}" onclick="answer(${i},${j})">${o}</button>`;});
        html+=`</div><div class="explanation" id="exp${i}">${q.explanation}</div></div>`;
      });
      document.getElementById('quizArea').innerHTML=html;
    }

    function answer(qi,oi){
      if(answeredSet.has(qi))return;
      answeredSet.add(qi);
      const q=QUESTIONS[qi];
      const btns=q.options.map((_,j)=>document.getElementById(`q${qi}o${j}`));
      btns.forEach(b=>b.classList.add('locked'));
      btns[q.answer].classList.add('correct-answer');
      if(oi===q.answer){correct++;}
      else{incorrect++;btns[oi].classList.add('wrong-answer');}
      document.getElementById('correctCount').textContent=`Correct: ${correct}`;
      document.getElementById('incorrectCount').textContent=`Incorrect: ${incorrect}`;
      document.getElementById(`exp${qi}`).classList.add('visible');
      if(answeredSet.size===QUESTIONS.length)showResults();
    }

    function showResults(){
      const r=document.getElementById('results');
      document.getElementById('bigScore').textContent=`${correct}/${QUESTIONS.length}`;
      const pct=Math.round(correct/QUESTIONS.length*100);
      let msg='';
      if(pct===100)msg='Perfect score! You have an excellent understanding of AI ethical principles.';
      else if(pct>=70)msg='Good work! Review the explanations for questions you missed to strengthen your understanding.';
      else msg='Consider revisiting the course material on AI ethical principles before retaking this quiz.';
      document.getElementById('resultMsg').textContent=msg;
      r.classList.add('visible');
    }

    function restart(){
      correct=0;incorrect=0;answeredSet=new Set();
      document.getElementById('correctCount').textContent='Correct: 0';
      document.getElementById('incorrectCount').textContent='Incorrect: 0';
      document.getElementById('results').classList.remove('visible');
      renderQuiz();
      window.scrollTo(0,0);
    }

    function toggleTheme(){const h=document.documentElement,c=h.getAttribute('data-theme'),n=c==='dark'?'light':'dark';h.setAttribute('data-theme',n);localStorage.setItem('theme',n);updateBtn(n);}
    function updateBtn(t){document.getElementById('themeIcon').innerHTML=t==='dark'?'&#x2600;&#xFE0F;':'&#x1F319;';document.getElementById('themeLabel').textContent=t==='dark'?'Light':'Dark';}
    (function(){const s=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',s);updateBtn(s);renderQuiz();})();
  </script>
</body>
</html>
